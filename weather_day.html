<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 날씨 & 문화 추천</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    line-height: 1.7;
    transition: background 1.2s ease, color 0.6s ease;
    color: var(--text);
    background: var(--bg);
  }

  /* ── Weather Themes ── */
  body.clear        { --bg:#fef3c7; --bg2:#fef9c3; --primary:#d97706; --text:#78350f; --card:rgba(255,255,255,.82); }
  body.partlyCloudy { --bg:#e0f2fe; --bg2:#bae6fd; --primary:#0284c7; --text:#0c4a6e; --card:rgba(255,255,255,.82); }
  body.cloudy       { --bg:#e2e8f0; --bg2:#cbd5e1; --primary:#475569; --text:#1e293b; --card:rgba(255,255,255,.82); }
  body.foggy        { --bg:#ecfdf5; --bg2:#d1fae5; --primary:#059669; --text:#064e3b; --card:rgba(255,255,255,.82); }
  body.drizzle      { --bg:#dbeafe; --bg2:#bfdbfe; --primary:#2563eb; --text:#1e3a8a; --card:rgba(255,255,255,.82); }
  body.rainy        { --bg:#c7d2fe; --bg2:#a5b4fc; --primary:#4f46e5; --text:#312e81; --card:rgba(255,255,255,.82); }
  body.snowy        { --bg:#f0f9ff; --bg2:#e0f2fe; --primary:#0369a1; --text:#0c4a6e; --card:rgba(255,255,255,.88); }
  body.thunderstorm { --bg:#1e1b4b; --bg2:#312e81; --primary:#a5b4fc; --text:#e0e7ff; --card:rgba(30,27,75,.75); }

  /* ── Layout ── */
  header { text-align:center; padding:2rem 1rem 1rem; }
  header h1 { font-size:1.4rem; font-weight:800; color:var(--primary); }
  header p  { font-size:.85rem; opacity:.7; margin-top:.2rem; }

  .loc-bar { display:flex; justify-content:center; gap:.5rem; padding:.6rem 1rem; flex-wrap:wrap; }
  .loc-bar input {
    padding:.5rem 1rem; border:2px solid var(--primary); border-radius:8px;
    font-size:.9rem; background:var(--card); color:var(--text); width:190px;
  }
  .loc-btn {
    padding:.5rem 1rem; background:var(--primary); color:#fff; border:none;
    border-radius:8px; cursor:pointer; font-size:.9rem; font-weight:600;
  }
  .loc-btn:hover { opacity:.85; }

  main { max-width:720px; margin:0 auto; padding:1rem 1rem 3rem; }

  #loading { text-align:center; padding:3rem; font-size:1.1rem; color:var(--primary); }
  #err-box { text-align:center; padding:1.5rem; }
  .err-btn { margin-top:.6rem; padding:.4rem .9rem; background:#dc2626; color:#fff; border:none; border-radius:6px; cursor:pointer; }

  /* ── Weather Card ── */
  .weather-card {
    background:var(--card); backdrop-filter:blur(12px);
    border-radius:20px; padding:1.4rem 1.6rem; margin-bottom:1.4rem;
    box-shadow:0 4px 24px rgba(0,0,0,.1);
    display:flex; align-items:center; gap:1.4rem;
  }
  .w-emoji { font-size:4.2rem; flex-shrink:0; }
  .w-loc   { font-size:.85rem; opacity:.65; margin-bottom:.2rem; }
  .w-temp  { font-size:2rem; font-weight:700; }
  .w-desc  { font-size:1rem; font-weight:600; margin-top:.15rem; }
  .w-meta  { display:flex; gap:1rem; font-size:.82rem; margin-top:.4rem; opacity:.7; }

  /* ── Content Cards ── */
  .card {
    background:var(--card); backdrop-filter:blur(10px);
    border-radius:16px; padding:1.3rem; margin-bottom:1.2rem;
    box-shadow:0 3px 18px rgba(0,0,0,.08);
  }
  .card-head {
    display:flex; align-items:center; gap:.5rem;
    font-size:1rem; font-weight:700; color:var(--primary);
    border-bottom:2px solid var(--primary); padding-bottom:.5rem; margin-bottom:.9rem;
  }

  /* Music */
  .music-title  { font-weight:700; font-size:.95rem; margin-bottom:.15rem; }
  .music-reason { font-size:.82rem; opacity:.65; margin-bottom:.7rem; }
  .yt-wrap { position:relative; width:100%; padding-top:56.25%; border-radius:10px; overflow:hidden; }
  .yt-wrap iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
  .yt-link { display:inline-block; margin-top:.5rem; font-size:.82rem; color:var(--primary); text-decoration:none; }
  .yt-link:hover { text-decoration:underline; }

  /* Poem */
  .poem-meta { font-size:.8rem; opacity:.6; margin-bottom:.5rem; }
  .poem-text {
    white-space:pre-line; font-family:'Malgun Gothic','Apple SD Gothic Neo',serif;
    font-size:.93rem; line-height:2; padding:.8rem 1rem;
    background:rgba(0,0,0,.04); border-radius:8px; border-left:3px solid var(--primary);
  }

  /* Painting */
  .paint-img { width:100%; border-radius:10px; margin-bottom:.6rem; display:block; }
  .paint-title  { font-weight:700; font-size:.95rem; }
  .paint-info   { font-size:.82rem; opacity:.65; margin-top:.2rem; }
  .paint-desc   { font-size:.87rem; margin-top:.4rem; }

  /* Places */
  .place-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.7rem; }
  .place-item { background:rgba(0,0,0,.05); border-radius:10px; padding:.75rem; }
  .place-icon { font-size:1.4rem; margin-bottom:.2rem; }
  .place-name { font-weight:700; font-size:.9rem; }
  .place-desc { font-size:.78rem; opacity:.65; margin-top:.2rem; }

  /* Books */
  .book-item { background:rgba(0,0,0,.05); border-radius:10px; padding:.8rem; margin-bottom:.6rem; }
  .book-title  { font-weight:700; font-size:.92rem; }
  .book-author { font-size:.78rem; opacity:.6; }
  .book-reason { font-size:.85rem; margin-top:.25rem; }

  /* Jobs */
  .job-sel {
    width:100%; padding:.5rem; border:2px solid var(--primary);
    border-radius:8px; background:var(--card); color:var(--text);
    font-size:.9rem; margin-bottom:.8rem; cursor:pointer;
  }
  .job-list { list-style:none; }
  .job-list li { padding:.45rem 0; border-bottom:1px solid rgba(0,0,0,.06); font-size:.9rem; }
  .job-list li::before { content:'✅ '; }
  .job-list li:last-child { border-bottom:none; }
</style>
</head>
<body class="clear">

<header>
  <h1>🌤 오늘의 날씨 & 문화 추천</h1>
  <p>날씨에 맞는 음악 · 시 · 그림 · 장소 · 책 · 활동을 제안합니다</p>
</header>

<div class="loc-bar">
  <button class="loc-btn" onclick="getGeo()">📍 내 위치</button>

  <button class="loc-btn" onclick="searchCity()">검색</button>
</div>

<main>
  <div id="loading">📡 위치를 확인하는 중...</div>
  <div id="err-box" style="display:none"></div>

  <!-- Weather -->
  <div id="weather-card" class="weather-card" style="display:none">
    <div class="w-emoji" id="w-emoji">☀️</div>
    <div>
      <div class="w-loc"  id="w-loc">-</div>
      <div class="w-temp" id="w-temp">--°C</div>
      <div class="w-desc" id="w-desc">-</div>
      <div class="w-meta">
        <span id="w-hum">💧 -</span>
        <span id="w-wind">💨 -</span>
        <span id="w-time" style="opacity:.45"></span>
      </div>
    </div>
  </div>

  <!-- Music -->
  <div id="music-card" class="card" style="display:none">
    <div class="card-head">🎵 오늘의 음악</div>
    <div class="music-title"  id="music-title"></div>
    <div class="music-reason" id="music-reason"></div>
    <div class="yt-wrap"><iframe id="yt-frame" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
    <a id="yt-link" class="yt-link" target="_blank" rel="noopener">▶ YouTube에서 검색하기</a>
  </div>

  <!-- Poem -->
  <div id="poem-card" class="card" style="display:none">
    <div class="card-head">📜 오늘의 시</div>
    <div class="poem-meta" id="poem-meta"></div>
    <div class="poem-text"  id="poem-text"></div>
  </div>

  <!-- Painting -->
  <div id="paint-card" class="card" style="display:none">
    <div class="card-head">🖼️ 오늘의 그림</div>
    <img id="paint-img" class="paint-img" alt="오늘의 그림" loading="lazy">
    <div class="paint-title" id="paint-title"></div>
    <div class="paint-info"  id="paint-info"></div>
    <div class="paint-desc"  id="paint-desc"></div>
  </div>

  <!-- Places -->
  <div id="place-card" class="card" style="display:none">
    <div class="card-head">📍 갈 수 있는 곳</div>
    <div id="place-grid" class="place-grid"></div>
  </div>

  <!-- Books -->
  <div id="book-card" class="card" style="display:none">
    <div class="card-head">📚 읽으면 좋은 책</div>
    <div id="book-list"></div>
  </div>

  <!-- Jobs -->
  <div id="job-card" class="card" style="display:none">
    <div class="card-head">💼 직업별 오늘 할 수 있는 일</div>
    <select class="job-sel" id="job-sel" onchange="renderJobs()">
      <option value="student">🎓 학생</option>
      <option value="office">💻 직장인</option>
      <option value="home">🏠 주부·부모</option>
      <option value="retired">🌿 은퇴자·시니어</option>
      <option value="freelance">🖥️ 프리랜서·재택근무</option>
      <option value="artist">🎨 크리에이터·예술가</option>
    </select>
    <ul id="job-list" class="job-list"></ul>
  </div>
</main>

      office:['재택근무 적극 활용','화상 회의로 업무 진행','낙뢰 주의 — 안전한 실내 유지'],

// ══════════════════════════════════════════
//  STATE & HELPERS
// ══════════════════════════════════════════
let curCond = 'clear';

function getCondition(code) {
  if (code <= 1) return 'clear';
  if (code === 2) return 'partlyCloudy';
  if (code === 3) return 'cloudy';
  if (code === 45 || code === 48) return 'foggy';
  if (code >= 51 && code <= 57) return 'drizzle';
  if ([61,63,65,80,81,82].includes(code)) return 'rainy';
  if ([71,73,75,85,86,77].includes(code)) return 'snowy';
  if (code >= 95) return 'thunderstorm';
  return 'partlyCloudy';
}

function show(id) { document.getElementById(id).style.display=''; }
function hide(id) { document.getElementById(id).style.display='none'; }
function el(id)   { return document.getElementById(id); }

// ══════════════════════════════════════════
//  FETCH
// ══════════════════════════════════════════
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m`
    + `&timezone=auto&wind_speed_unit=kmh`;
  const r = await fetch(url);
  return (await r.json()).current;
}

async function reverseGeo(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&accept-language=ko`);
    const j = await r.json();
    return j.address?.city || j.address?.county || j.address?.state || '알 수 없는 위치';
  } catch { return '현재 위치'; }
}

// ══════════════════════════════════════════
//  ENTRY POINTS
// ══════════════════════════════════════════
function getGeo() {
  if (!navigator.geolocation) { showErr('이 브라우저는 위치 서비스를 지원하지 않습니다.'); return; }
  showLoading();
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { latitude: lat, longitude: lon } = pos.coords;
      const city = await reverseGeo(lat, lon);
      await load(lat, lon, city);
    },
    () => load(37.5665, 126.9780, '서울')
  );
}

async function searchCity() {
  const city = el('city-input').value.trim();
  if (!city) return;
  showLoading();
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=ko&format=json`);
    const j = await r.json();
    if (!j.results?.length) throw new Error('도시를 찾을 수 없습니다.');
    const { latitude, longitude, name } = j.results[0];
    await load(latitude, longitude, name);
  } catch(e) { showErr(e.message); }
}

async function load(lat, lon, city) {
  try {
    showLoading();
    const w = await fetchWeather(lat, lon);
    curCond = getCondition(w.weather_code);
    renderWeather(w, city);
    renderContent();
  } catch(e) { showErr('날씨를 불러오지 못했습니다: ' + e.message); }
}

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function renderWeather(w, city) {
  const d = DB[curCond];
  document.body.className = d.cls;
  hide('loading'); hide('err-box');

  el('w-emoji').textContent = d.emoji;
  el('w-loc').textContent   = '📍 ' + city;
  el('w-temp').textContent  = Math.round(w.temperature_2m) + '°C';
  el('w-desc').textContent  = d.name;
  el('w-hum').textContent   = '💧 ' + w.relative_humidity_2m + '%';
  el('w-wind').textContent  = '💨 ' + Math.round(w.wind_speed_10m) + 'km/h';
  const now = new Date();
  el('w-time').textContent  = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0') + ' 기준';
  el('weather-card').style.display = 'flex';
}

function renderContent() {
  const d = DB[curCond];

  // Music
  el('music-title').textContent  = d.music.title;
  el('music-reason').textContent = d.music.reason;
  el('yt-frame').src = `https://www.youtube-nocookie.com/embed/${d.music.yt}?rel=0&modestbranding=1`;
  el('yt-link').href = `https://www.youtube.com/results?search_query=${encodeURIComponent(d.music.search)}`;
  el('yt-link').textContent = '▶ "' + d.music.title + '" YouTube에서 검색';
  show('music-card');

  // Poem
  el('poem-meta').textContent = d.poem.meta;
  el('poem-text').textContent = d.poem.text;
  show('poem-card');

  // Painting
  el('paint-img').src   = d.art.img;
  el('paint-img').alt   = d.art.title;
  el('paint-title').textContent = d.art.title;
  el('paint-info').textContent  = d.art.info;
  el('paint-desc').textContent  = d.art.desc;
  show('paint-card');

  // Places
  el('place-grid').innerHTML = d.places.map(p => `
    <div class="place-item">
      <div class="place-icon">${p.i}</div>
      <div class="place-name">${p.n}</div>
      <div class="place-desc">${p.d}</div>
    </div>`).join('');
  show('place-card');

  // Books
  el('book-list').innerHTML = d.books.map(b => `
    <div class="book-item">
      <div class="book-title">📖 ${b.t}</div>
      <div class="book-author">${b.a}</div>
      <div class="book-reason">${b.r}</div>
    </div>`).join('');
  show('book-card');

  // Jobs
  show('job-card');
  renderJobs();
}

function renderJobs() {
  const job  = el('job-sel').value;
  const acts = DB[curCond]?.jobs[job] || [];
  el('job-list').innerHTML = acts.map(a => `<li>${a}</li>`).join('');
}

// ── Loading / Error ──────────────────────
function showLoading() {
  show('loading'); hide('err-box');
  el('weather-card').style.display = 'none';
  ['music-card','poem-card','paint-card','place-card','book-card','job-card']
    .forEach(hide);
}
function showErr(msg) {
  hide('loading');
  el('err-box').style.display = 'block';
  el('err-box').innerHTML = `<p>⚠️ ${msg}</p>
    <button class="err-btn" onclick="load(37.5665,126.9780,'서울')">서울 날씨로 보기</button>`;
}

// ── Init ─────────────────────────────────
window.addEventListener('load', getGeo);
</script>
