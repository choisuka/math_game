<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="6" fill="#a78bfa" opacity="0.6"/>
  <circle cx="420" cy="60" r="4" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="450" cy="200" r="5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="60" cy="380" r="4" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="460" cy="400" r="6" fill="#a78bfa" opacity="0.4"/>
  <!-- Crown -->
  <polygon points="140,220 256,130 372,220 340,180 256,160 172,180" fill="url(#glow)" opacity="0.9"/>
  <!-- Math symbols -->
  <text x="256" y="310" font-size="160" text-anchor="middle" fill="white" font-family="Arial Black, sans-serif" font-weight="900">∑</text>
  <!-- Bottom text -->
  <text x="256" y="420" font-size="52" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-weight="bold">수학왕국</text>
  <!-- Decorative border -->
  <rect x="8" y="8" width="496" height="496" rx="76" fill="none" stroke="#a78bfa" stroke-width="4" opacity="0.4"/>
</svg>
